name: CI

permissions: {}

on:
  pull_request:
  push:
    branches:
      - alpha
      - beta
      - main
      - renovate/**

jobs:
  ci-optimization:
    name: CI optimization
    uses: dargmuesli/github-actions/.github/workflows/ci-optimization.yml@5bfaf3670be589f36169fd998c5f60e8ddc9838a # 5.4.1
    permissions:
      pull-requests: read
  build:
    needs: ci-optimization
    if: needs.ci-optimization.outputs.continue == 'true'
    name: Build
    uses: dargmuesli/github-actions/.github/workflows/docker.yml@5bfaf3670be589f36169fd998c5f60e8ddc9838a # 5.4.1
    permissions:
      packages: write
    with:
      PUSH: false
