name: CI

permissions: {}

on:
  pull_request:
  push:
    branches:
      - alpha
      - beta
      - main
      - renovate/**

jobs:
  ci-optimization:
    name: CI optimization
    uses: dargmuesli/github-actions/.github/workflows/ci-optimization.yml@b24aec150dd9a8562cd773dbd85487e56e46fdc6 # 5.7.0
    permissions:
      pull-requests: read
  build:
    needs: ci-optimization
    if: needs.ci-optimization.outputs.continue == 'true'
    name: Build
    uses: dargmuesli/github-actions/.github/workflows/docker.yml@b24aec150dd9a8562cd773dbd85487e56e46fdc6 # 5.7.0
    permissions:
      packages: write
    with:
      PUSH: false
