name: CI

permissions: {}

on:
  pull_request:
  push:
    branches:
      - alpha
      - beta
      - main
      - renovate/**

jobs:
  ci-optimization:
    name: CI optimization
    uses: dargmuesli/github-actions/.github/workflows/ci-optimization.yml@2789c140ab6cc2f5a8d5c2d1f5cdc7a796056545 # 5.2.3
    permissions:
      pull-requests: read
  build:
    needs: ci-optimization
    if: needs.ci-optimization.outputs.continue == 'true'
    name: Build
    uses: dargmuesli/github-actions/.github/workflows/docker.yml@2789c140ab6cc2f5a8d5c2d1f5cdc7a796056545 # 5.2.3
    permissions:
      packages: write
    with:
      PUSH: false
