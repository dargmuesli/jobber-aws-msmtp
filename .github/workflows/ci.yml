name: CI

permissions: {}

on:
  pull_request:
  push:
    branches:
      - alpha
      - beta
      - main
      - renovate/**

jobs:
  ci-optimization:
    name: CI optimization
    uses: dargmuesli/github-actions/.github/workflows/ci-optimization.yml@1fc4c936d18dfa98bca895c19dd429ee108e07ea # 5.1.2
    permissions:
      pull-requests: read
  build:
    needs: ci-optimization
    if: needs.ci-optimization.outputs.continue == 'true'
    name: Build
    uses: dargmuesli/github-actions/.github/workflows/docker.yml@1fc4c936d18dfa98bca895c19dd429ee108e07ea # 5.1.2
    permissions:
      packages: write
    with:
      PUSH: false
