name: CI

permissions: {}

on:
  pull_request:
  push:
    branches:
      - alpha
      - beta
      - main
      - renovate/**

jobs:
  ci-optimization:
    name: CI optimization
    uses: dargmuesli/github-actions/.github/workflows/ci-optimization.yml@7fbad16a13b7cbfe4f905498c71cd5e2c08751d8 # 5.5.2
    permissions:
      pull-requests: read
  build:
    needs: ci-optimization
    if: needs.ci-optimization.outputs.continue == 'true'
    name: Build
    uses: dargmuesli/github-actions/.github/workflows/docker.yml@7fbad16a13b7cbfe4f905498c71cd5e2c08751d8 # 5.5.2
    permissions:
      packages: write
    with:
      PUSH: false
