name: CI

permissions: {}

on:
  pull_request:
  push:
    branches:
      - alpha
      - beta
      - main
      - renovate/**

jobs:
  ci-optimization:
    name: CI optimization
    uses: dargmuesli/github-actions/.github/workflows/ci-optimization.yml@8f01012bc996c714b983f2b4c90c8f546c69f342 # 5.2.2
    permissions:
      pull-requests: read
  build:
    needs: ci-optimization
    if: needs.ci-optimization.outputs.continue == 'true'
    name: Build
    uses: dargmuesli/github-actions/.github/workflows/docker.yml@8f01012bc996c714b983f2b4c90c8f546c69f342 # 5.2.2
    permissions:
      packages: write
    with:
      PUSH: false
